<?xml version="1.0" encoding="UTF-8"?>
<!--
  Dev Server Manager icon.
  Stacked-rows metaphor matches what the user sees in the app sidebar:
  three project entries, one currently running (green), two stopped.
  Scales cleanly to 16×16, 32×32, 48×48, 64×64, 128×128, 256×256, 512×512.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle 1px inner border for definition at small sizes -->
  <rect x="2" y="2" width="508" height="508" rx="111" fill="none"
        stroke="#2e2e2e" stroke-width="2"/>

  <!-- Row 1 (active / running) -->
  <rect x="96" y="132" width="320" height="68" rx="14" fill="url(#green)"
        filter="url(#glow)"/>
  <circle cx="136" cy="166" r="10" fill="#ffffff"/>

  <!-- Row 2 (stopped) -->
  <rect x="96" y="222" width="320" height="68" rx="14" fill="#1a1a1a"
        stroke="#2e2e2e" stroke-width="2"/>
  <circle cx="136" cy="256" r="10" fill="#3a3a3a"/>

  <!-- Row 3 (stopped) -->
  <rect x="96" y="312" width="320" height="68" rx="14" fill="#1a1a1a"
        stroke="#2e2e2e" stroke-width="2"/>
  <circle cx="136" cy="346" r="10" fill="#3a3a3a"/>
</svg>
